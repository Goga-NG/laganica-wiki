site_name: Laganica Wiki
site_url: https://goga-ng.github.io/laganica-wiki/

theme:
  name: material
  features:
    - navigation.instant  
  logo: assets/hospital.png
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Tamna tema
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Svetla tema
        
extra_css:
  - stylesheets/extra.css
  
extra:
  generator: false

extra_javascript:
  - javascripts/theme.js

plugins:
  - search
  - awesome-pages
        
nav:
  - Početna: index.md
  - Prva godina:
    
    - Anatomija: prva-godina/anatomija/index.md
    - Histologija i embriologija: prva-godina/histologija-i-embriologija/index.md
    - Genetika: prva-godina/genetika/index.md
  - Druga godina:
    
    - Imunologija: druga-godina/imunologija/index.md
    - Medicinska fiziologija: druga-godina/medicinska-fiziologija/index.md
    - Medicinska biohemija:
      - Proteini - struktura, funkcija i sinteza: druga-godina/medicinska-biohemija/proteini/index.md 
      - Enzimi: druga-godina/medicinska-biohemija/enzimi/index.md
      - Metabolizam i digestija: druga-godina/medicinska-biohemija/metabolizam-i-digestija/index.md
      - Respiratorni lanac: druga-godina/medicinska-biohemija/respiratorni-lanac/index.md
      - Ugljeni hidrati: druga-godina/medicinska-biohemija/ugljeni-hidrati/index.md
      - Lipidi: druga-godina/medicinska-biohemija/lipidi/index.md
      - Metabolizam proteina i aminokiselina: druga-godina/medicinska-biohemija/metabolizam-proteina/index.md
      - Metabolizam nukleotida i nukleinske kiseline: druga-godina/medicinska-biohemija/metabolizam-nukleotida/index.md
      - Signalni putevi: druga-godina/medicinska-biohemija/signalni-putevi/index.md
      - Vitamini: druga-godina/medicinska-biohemija/vitamini/index.md
      - Regulacija metabolizma i biohemija tkiva: druga-godina/medicinska-biohemija/regulacija-metabolizma/index.md
    - Mikrobiologija: druga-godina/mikrobiologija/index.md
  - Treća godina:
    - Patologija:
      - Opšta patologija: treca-godina/patologija/opsta-patologija/index.md
      - Patologija tumora: treca-godina/patologija/patologija-tumora/index.md
      - Specijalna patologija: treca-godina/patologija/specijalna-patologija/index.md
    - Patofiziologija: treca-godina/patofiziologija/index.md
    - Farmakologija: treca-godina/farmakologija/index.md
    - Epidemiologija: treca-godina/epidemiologija/index.md
  - Četvrta godina: cetvrta-godina/index.md
  - Peta godina: peta-godina/index.md
  - Šesta godina: sesta-godina/index.md